version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: smart_email_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: smart_email
      POSTGRES_USER: smart_email
      POSTGRES_PASSWORD: smart_email_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smart_email -d smart_email"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart_email_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://smart_email:smart_email_password@db:5432/smart_email
      APP_ENV: production
      CORS_ALLOW_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      BACKEND_BASE_URL: http://localhost:8000
      FRONTEND_BASE_URL: http://localhost:3000
      ENABLE_DEADLINE_WORKER: "true"
      PORT: "8000"
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: http://localhost:8000
    container_name: smart_email_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
